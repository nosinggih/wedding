<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- COVER -->
<div id="cover">
    <div class="cover-content">
        <h1>Undangan Pernikahan</h1>
        <p>Kepada Yth.</p>
        <h2 id="guest-name">Tamu Undangan</h2>

        <button onclick="openInvitation()">Buka Undangan</button>
    </div>
</div>

<!-- HERO -->
<section class="section cover">
    <h1>Nama Mempelai</h1>
    <p>Undangan Pernikahan</p>
</section>

<!-- OPENING -->
<section class="section opening">
    <h2>Opening</h2>
    <p>Dengan memohon rahmat dan ridho Allah SWT...</p>
</section>

<!-- COUPLE -->
<section class="section couple">
    <h2>Mempelai</h2>
    <p>Nama Pria & Nama Wanita</p>
</section>

<!-- EVENT -->
<section class="section event">
    <h2>Detail Acara</h2>
    <p>Tanggal, Waktu, Lokasi</p>
</section>

<!-- GALLERY -->
<section class="section gallery">
    <h2>Galeri</h2>
    <p>Foto-foto nanti di sini</p>
</section>

<!-- RSVP -->
<section class="section rsvp">
    <h2>Ucapan & Doa</h2>
    <p>Form nanti di sini</p>
</section>

<!-- FOOTER -->
<section class="section footer">
    <p>Terima kasih</p>
</section>

<script src="assets/js/main.js"></script>
</body>
</html>
